<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Threads OAuth Callback</title>
    <style>
      body {
        color: #17212b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 40px 20px;
        background: #f6f7f9;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        background: white;
        border: 1px solid #d8dde3;
        border-radius: 8px;
        padding: 28px;
      }

      h1 {
        font-size: 24px;
        margin: 0 0 12px;
      }

      p {
        line-height: 1.5;
      }

      code,
      textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 120px;
        margin-top: 12px;
        padding: 12px;
        resize: vertical;
      }

      button {
        margin-top: 12px;
        padding: 10px 14px;
        border: 0;
        border-radius: 6px;
        color: white;
        background: #1967d2;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Threads OAuth Callback</h1>
      <p>Copy the authorization code below and use it with <code>npm run token:exchange</code>.</p>
      <textarea id="code" readonly></textarea>
      <button id="copy" type="button">Copy code</button>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code") || "";
      const output = document.querySelector("#code");
      output.value = code || "No code found in URL.";

      document.querySelector("#copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(code);
      });
    </script>
  </body>
</html>
