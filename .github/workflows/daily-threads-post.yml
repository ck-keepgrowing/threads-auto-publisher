name: Daily Threads Post

on:
  schedule:
    # 09:00 Asia/Hong_Kong is 01:00 UTC.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish today's post
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID || 'me' }}
          THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION || 'v1.0' }}
          TIME_ZONE: "Asia/Hong_Kong"
          CONTENT_SOURCE: ${{ secrets.CONTENT_SOURCE || 'local' }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          DRY_RUN: "true"
        run: npm run post:today

      - name: Commit publication log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published.json data/errors.json
          git diff --staged --quiet || git commit -m "Record Threads publication"
          git push
