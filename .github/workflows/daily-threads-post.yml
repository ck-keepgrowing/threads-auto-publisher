name: Daily Threads Post

on:
  schedule:
    # Poll every 15 minutes, away from the top of the hour.
    # The runner decides what is due in Asia/Hong_Kong time and catches up approved posts after their target slot.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "auto, approval, or publish"
        required: false
        default: "auto"
      slot:
        description: "11:00, 14:00, 18:00, or 21:00"
        required: false
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[run-social-workflow]') || contains(github.event.head_commit.message, '[approval-1200-social-workflow]') || contains(github.event.head_commit.message, '[approval-2000-social-workflow]') || contains(github.event.head_commit.message, '[force-approval-1200-social-workflow]') || contains(github.event.head_commit.message, '[force-approval-social-workflow]') || contains(github.event.head_commit.message, '[publish-1200-social-workflow]') || contains(github.event.head_commit.message, '[publish-social-workflow]') || contains(github.event.head_commit.message, '[force-publish-1200-social-workflow]') || contains(github.event.head_commit.message, '[force-publish-social-workflow]') || contains(github.event.head_commit.message, '[debug-telegram-social-workflow]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Threads workflow
        if: ${{ !contains(github.event.head_commit.message, '[debug-telegram-social-workflow]') }}
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID || 'me' }}
          THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION || 'v1.0' }}
          TIME_ZONE: "Asia/Hong_Kong"
          CONTENT_SOURCE: ${{ secrets.CONTENT_SOURCE || 'local' }}
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'openai/gpt-5.4-mini' }}
          ENABLE_TRENDS_CONTEXT: ${{ secrets.ENABLE_TRENDS_CONTEXT || 'true' }}
          GOOGLE_TRENDS_RSS_URL: ${{ secrets.GOOGLE_TRENDS_RSS_URL || 'https://trends.google.com/trending/rss?geo=HK' }}
          GOOGLE_TRENDS_LIMIT: ${{ secrets.GOOGLE_TRENDS_LIMIT || '10' }}
          ACTION_MODE: ${{ inputs.mode || (github.event_name == 'push' && contains(github.event.head_commit.message, '[run-social-workflow]') && 'auto') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[publish-1200-social-workflow]') && 'publish') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[publish-social-workflow]') && 'publish') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[force-publish-1200-social-workflow]') && 'publish') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[force-publish-social-workflow]') && 'publish') || (github.event_name == 'push' && 'approval') || 'auto' }}
          TARGET_SLOT: ${{ inputs.slot || (github.event_name == 'push' && contains(github.event.head_commit.message, '[approval-1200-social-workflow]') && '12:00') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[force-approval-1200-social-workflow]') && '12:00') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[publish-1200-social-workflow]') && '12:00') || (github.event_name == 'push' && contains(github.event.head_commit.message, '[force-publish-1200-social-workflow]') && '12:00') || (github.event_name == 'push' && '20:00') || '' }}
          FORCE_APPROVAL: ${{ github.event_name == 'push' && (contains(github.event.head_commit.message, '[force-approval-social-workflow]') || contains(github.event.head_commit.message, '[force-approval-1200-social-workflow]')) }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
          FORCE_APPROVED: ${{ github.event_name == 'push' && (contains(github.event.head_commit.message, '[force-publish-social-workflow]') || contains(github.event.head_commit.message, '[force-publish-1200-social-workflow]')) }}
          DRY_RUN: "false"
        run: npm run workflow:run

      - name: Debug Telegram updates
        if: ${{ contains(github.event.head_commit.message, '[debug-telegram-social-workflow]') }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run telegram:debug

      - name: Commit workflow logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/published.json data/errors.json data/approval-requests.json data/telegram-debug.json
          if git diff --staged --quiet; then
            echo "No log changes to commit."
          else
            git commit -m "Record Threads publication"
            git pull --rebase origin main
            git push
          fi
