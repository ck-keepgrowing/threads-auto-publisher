name: Collect Engagement Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect engagement metrics
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION || 'v1.0' }}
        run: npm run collect:engagement

      - name: Commit engagement data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/performance.json data/topic-memory.json
          git diff --staged --quiet || git commit -m "Update engagement metrics and topic memory"
          git push
