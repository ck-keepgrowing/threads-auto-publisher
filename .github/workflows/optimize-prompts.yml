name: Optimize Insurance Coach Prompts

on:
  schedule:
    # Weekly on Monday at 08:30 HKT.
    - cron: "30 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Optimize prompts from performance and review feedback
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'openai/gpt-5.4-mini' }}
          OPENROUTER_FALLBACK_MODEL: ${{ secrets.OPENROUTER_FALLBACK_MODEL }}
        run: npm run coach:optimize-prompts

      - name: Commit content engine changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content-engine
          git diff --staged --quiet || git commit -m "Optimize insurance coach prompts"
          git push
