name: Collect Insurance Coach Metrics

on:
  schedule:
    # Once per day at 23:30 HKT.
    - cron: "30 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect Threads metrics
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID || 'me' }}
          THREADS_API_VERSION: ${{ secrets.THREADS_API_VERSION || 'v1.0' }}
        run: npm run coach:collect-metrics

      - name: Commit content engine changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content-engine
          git diff --staged --quiet || git commit -m "Collect insurance coach metrics"
          git pull --rebase origin main
          git push
