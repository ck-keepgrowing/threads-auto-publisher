name: Generate Insurance Coach Draft

on:
  schedule:
    # Poll every 15 minutes. The script generates only during review windows:
    # 07:00 for 10:00, 12:00 for 15:00, and 18:00 for 21:00 HKT.
    - cron: "*/15 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[run-coach-generate]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate draft and send Telegram review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'openai/gpt-5.4-mini' }}
          OPENROUTER_FALLBACK_MODEL: ${{ secrets.OPENROUTER_FALLBACK_MODEL }}
          OPENROUTER_TIMEOUT_MS: 45000
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run coach:generate

      - name: Commit content engine changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content-engine
          git diff --staged --quiet || git commit -m "Generate insurance coach draft"
          git pull --rebase origin main
          git push
