name: Evolve Editorial Briefs

on:
  schedule:
    - cron: "0 15 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Evolve editorial briefs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'openai/gpt-5.4-mini' }}
        run: npm run evolve:briefs

      - name: Commit updated briefs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/editor-briefs.json
          git diff --staged --quiet || git commit -m "Evolve editorial briefs based on engagement data"
          git push
